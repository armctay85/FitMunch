<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    body { font-family: Arial, sans-serif; width: 330px; padding: 12px; }
    input, button { width: 100%; padding: 9px; border-radius: 8px; margin-bottom: 8px; }
    button { border: 0; background: #2563eb; color: white; font-weight: 600; cursor: pointer; }
    pre { max-height: 180px; overflow: auto; background: #f3f4f6; padding: 8px; border-radius: 8px; }
  </style>
</head>
<body>
  <h3>Car Tracker Capture</h3>
  <input id="apiBase" placeholder="API base (default http://localhost:5000)" />
  <input id="token" placeholder="Capture token (30-day)" />
  <button id="save">Save Settings</button>
  <button id="capture">Capture Current Listing</button>
  <pre id="output">Ready.</pre>
  <script src="popup.js"></script>
</body>
</html>
