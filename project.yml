name: FitMunch
options:
  bundleIdPrefix: com.fitmunch
  deploymentTarget:
    iOS: "17.0"

packages:
  RevenueCat:
    url: https://github.com/RevenueCat/purchases-ios-spm
    from: "4.0.0"

targets:
  FitMunch:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: FitMunch
    info:
      path: FitMunch/Resources/Info.plist
      properties: {}
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.fitmunch.ios
        SWIFT_VERSION: "5.9"
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_FILE: FitMunch/Resources/Info.plist
        DEVELOPMENT_TEAM: 48SW62N9BZ
        CODE_SIGN_STYLE: Automatic
    dependencies:
      - package: RevenueCat
        product: RevenueCat
