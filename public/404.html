<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>404 — Page not found | FitMunch</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:#f8fafc;color:#0f172a;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px}
.card{text-align:center;max-width:480px}
.code{font-size:7rem;font-weight:900;line-height:1;color:#e2e8f0;letter-spacing:-.08em;margin-bottom:8px}
h1{font-size:1.4rem;font-weight:800;margin-bottom:8px;color:#0f172a}
p{font-size:.92rem;color:#64748b;line-height:1.7;margin-bottom:28px}
.links{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.btn-primary{background:#16a34a;color:#fff;font-size:.9rem;font-weight:700;text-decoration:none;padding:12px 24px;border-radius:10px;transition:all .15s;box-shadow:0 2px 8px rgba(22,163,74,.25)}
.btn-primary:hover{background:#15803d;transform:translateY(-1px)}
.btn-ghost{background:#fff;color:#0f172a;font-size:.9rem;font-weight:600;text-decoration:none;padding:12px 24px;border-radius:10px;border:1px solid #e2e8f0;transition:all .15s}
.btn-ghost:hover{border-color:#cbd5e1;background:#f1f5f9}
.foot{font-size:.75rem;color:#94a3b8;margin-top:28px}
.foot a{color:#16a34a;text-decoration:none}
</style>
</head>
<body>
<div class="card">
  <div class="code">404</div>
  <h1>This page doesn't exist</h1>
  <p>Looks like you've wandered off the path. The page you're looking for isn't here — but there's plenty more worth finding.</p>
  <div class="links">
    <a href="/" class="btn-primary">Back to home</a>
    <a href="/support" class="btn-ghost">Get support</a>
  </div>
  <div class="foot">
    <a href="/login.html">Sign in</a> · <a href="/contact">Contact us</a>
  </div>
</div>
</body>
</html>
