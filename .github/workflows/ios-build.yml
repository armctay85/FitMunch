name: iOS Build and Test

# The iOS lane is parked while the web product leads. Only build when iOS
# sources actually change (or on manual dispatch) so web pushes don't
# generate failure noise.
on:
  push:
    branches: [ main, master ]
    paths:
      - "FitMunch/**"
      - "project.yml"
      - ".github/workflows/ios-build.yml"
  pull_request:
    branches: [ main, master ]
    paths:
      - "FitMunch/**"
      - "project.yml"
      - ".github/workflows/ios-build.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: Select Xcode
      run: sudo xcode-select -s $(ls -d /Applications/Xcode*.app | tail -1)/Contents/Developer

    - name: Install XcodeGen
      run: brew install xcodegen

    # The project references RevenueCat.xcframework at repo root (not vendored).
    # Same download used by ios-archive.yml — without it every build fails with
    # "There is no XCFramework found".
    - name: Download RevenueCat XCFramework
      run: |
        curl -L -o RevenueCat.xcframework.zip \
          https://github.com/RevenueCat/purchases-ios/releases/download/5.14.4/RevenueCat.xcframework.zip
        unzip -q RevenueCat.xcframework.zip -d rc_tmp
        XCFW=$(find rc_tmp -maxdepth 3 -name "RevenueCat.xcframework" -type d | head -1)
        mv "$XCFW" ./RevenueCat.xcframework
        rm -rf rc_tmp
        xattr -cr RevenueCat.xcframework || true

    - name: Generate Xcode project
      run: xcodegen generate

    - name: Resolve packages
      run: xcodebuild -resolvePackageDependencies -project FitMunch.xcodeproj -scheme FitMunch

    - name: Build
      # generic simulator destination: compiles for any sim without depending on
      # which device models the runner image ships (varies across macOS images)
      run: |
        xcodebuild clean build \
          -project FitMunch.xcodeproj \
          -scheme FitMunch \
          -destination 'generic/platform=iOS Simulator' \
          CODE_SIGNING_ALLOWED=NO
