name: iOS Archive and Upload to App Store Connect

on:
  workflow_dispatch:  # Manual trigger only

jobs:
  archive:
    runs-on: macos-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Select Xcode
      run: sudo xcode-select -s $(ls -d /Applications/Xcode*.app | tail -1)/Contents/Developer
    
    - name: Setup automatic code signing
      env:
        ASC_USERNAME: ${{ secrets.ASC_USERNAME }}
        ASC_APP_SPECIFIC_PASSWORD: ${{ secrets.ASC_APP_SPECIFIC_PASSWORD }}
      run: |
        # Create keychain for automatic signing
        security create-keychain -p "" build.keychain
        security default-keychain -s build.keychain
        security unlock-keychain -p "" build.keychain
        
        # Add to keychain search list
        security list-keychains -s build.keychain
        
        # Set keychain timeout to 1 hour
        security set-keychain-settings -t 3600 -u build.keychain
        
        # Import Apple ID credentials for automatic signing
        echo "Setting up automatic code signing with Apple ID"
    
    - name: Resolve Swift Package Dependencies
      run: xcodebuild -resolvePackageDependencies -project FitMunch.xcodeproj -scheme FitMunch
    
    - name: Archive the app
      run: |
        xcodebuild archive \
          -project FitMunch.xcodeproj \
          -scheme FitMunch \
          -configuration Release \
          -archivePath ./build/FitMunch.xcarchive \
          -destination generic/platform=iOS \
          CODE_SIGN_STYLE=Automatic \
          MARKETING_VERSION=1.0 \
          CURRENT_PROJECT_VERSION=1
    
    - name: Export IPA
      env:
        ASC_USERNAME: ${{ secrets.ASC_USERNAME }}
        ASC_APP_SPECIFIC_PASSWORD: ${{ secrets.ASC_APP_SPECIFIC_PASSWORD }}
      run: |
        xcodebuild -exportArchive \
          -archivePath ./build/FitMunch.xcarchive \
          -exportOptionsPlist ./ExportOptions.plist \
          -exportPath ./build \
          -allowProvisioningUpdates \
          -authenticationKeyID "${{ secrets.ASC_KEY_ID }}" \
          -authenticationKeyIssuerID "${{ secrets.ASC_ISSUER_ID }}" \
          -authenticationKeyPath ./AuthKey.p8
    
    - name: Upload IPA as artifact
      uses: actions/upload-artifact@v4
      with:
        name: FitMunch-IPA
        path: ./build/FitMunch.ipa
        retention-days: 7
    
    - name: Upload to App Store Connect
      env:
        ASC_USERNAME: ${{ secrets.ASC_USERNAME }}
        ASC_APP_SPECIFIC_PASSWORD: ${{ secrets.ASC_APP_SPECIFIC_PASSWORD }}
      run: |
        # Validate the IPA
        xcrun altool --validate-app \
          -f ./build/FitMunch.ipa \
          -t ios \
          -u "$ASC_USERNAME" \
          -p "$ASC_APP_SPECIFIC_PASSWORD" \
          --output-format xml
        
        # Upload to App Store Connect
        xcrun altool --upload-app \
          -f ./build/FitMunch.ipa \
          -t ios \
          -u "$ASC_USERNAME" \
          -p "$ASC_APP_SPECIFIC_PASSWORD" \
          --output-format xml
        
        echo "App successfully uploaded to App Store Connect"