name: iOS Archive & Upload

on:
  workflow_dispatch:
    inputs:
      upload_to_asc:
        description: 'Upload to App Store Connect'
        required: false
        default: 'true'
        type: boolean
  push:
    branches:
      - deploy

jobs:
  archive:
    runs-on: macos-14
    timeout-minutes: 60

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Select Xcode
      run: |
        sudo xcode-select -s "$(ls -d /Applications/Xcode*.app | sort -V | tail -1)/Contents/Developer"
        xcodebuild -version

    - name: Install XcodeGen
      run: brew install xcodegen

    - name: Generate Xcode project
      run: xcodegen generate

    - name: Import certificate
      uses: Apple-Actions/import-codesign-certs@v3
      with:
        p12-file-base64: ${{ secrets.CERTIFICATES_P12 }}
        p12-password: ${{ secrets.CERTIFICATES_PASSWORD }}
        keychain-password: ${{ secrets.KEYCHAIN_PASSWORD }}

    - name: Install provisioning profile
      env:
        PROVISIONING_PROFILE: ${{ secrets.PROVISIONING_PROFILE }}
      run: |
        PP_PATH="$HOME/Library/MobileDevice/Provisioning Profiles"
        mkdir -p "$PP_PATH"
        echo "$PROVISIONING_PROFILE" | base64 -D > "$PP_PATH/FitMunch.mobileprovision"
        PROFILE_UUID=$(security cms -D -i "$PP_PATH/FitMunch.mobileprovision" | plutil -extract UUID raw -)
        echo "Profile UUID: $PROFILE_UUID"
        echo "PROFILE_UUID=$PROFILE_UUID" >> $GITHUB_ENV
        security find-identity -v -p codesigning

    - name: Resolve package dependencies
      run: xcodebuild -resolvePackageDependencies -project FitMunch.xcodeproj -scheme FitMunch

    - name: Archive
      run: |
        xcodebuild clean archive \
          -project FitMunch.xcodeproj \
          -scheme FitMunch \
          -archivePath "$RUNNER_TEMP/FitMunch.xcarchive" \
          -destination 'generic/platform=iOS' \
          DEVELOPMENT_TEAM=48SW62N9BZ \
          -allowProvisioningUpdates

    - name: Export IPA
      run: |
        xcodebuild -exportArchive \
          -archivePath "$RUNNER_TEMP/FitMunch.xcarchive" \
          -exportOptionsPlist ExportOptions.plist \
          -exportPath "$RUNNER_TEMP/export" \
          -allowProvisioningUpdates

    - name: Upload IPA artifact
      uses: actions/upload-artifact@v4
      with:
        name: FitMunch-IPA
        path: ${{ runner.temp }}/export/*.ipa
        retention-days: 14

    - name: Upload to App Store Connect
      if: ${{ inputs.upload_to_asc == 'true' || github.ref == 'refs/heads/deploy' }}
      env:
        ASC_USERNAME: ${{ secrets.ASC_USERNAME }}
        ASC_PASSWORD: ${{ secrets.ASC_PASSWORD }}
      run: |
        IPA_PATH=$(find "$RUNNER_TEMP/export" -name '*.ipa' | head -1)
        echo "Uploading: $IPA_PATH"
        xcrun altool --upload-app \
          --type ios \
          --file "$IPA_PATH" \
          --username "$ASC_USERNAME" \
          --password "$ASC_PASSWORD" \
          --verbose
