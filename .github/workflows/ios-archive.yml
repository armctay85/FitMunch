name: iOS Archive and Upload to App Store Connect

on:
  workflow_dispatch:  # Manual trigger only

jobs:
  archive:
    runs-on: macos-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Select Xcode
      run: sudo xcode-select -s $(ls -d /Applications/Xcode*.app | tail -1)/Contents/Developer
    
    - name: Import Apple Distribution Certificate
      env:
        CERTIFICATES_P12: ${{ secrets.CERTIFICATES_P12 }}
        CERTIFICATES_P12_PASSWORD: ${{ secrets.CERTIFICATES_P12_PASSWORD }}
      run: |
        # Create certificate directory
        mkdir -p ~/private_keys
        
        # Decode and save the .p12 file
        echo "$CERTIFICATES_P12" | base64 --decode > ~/private_keys/certificate.p12
        
        # Create keychain
        security create-keychain -p "" build.keychain
        security default-keychain -s build.keychain
        security unlock-keychain -p "" build.keychain
        
        # Import certificate
        security import ~/private_keys/certificate.p12 -k build.keychain -P "$CERTIFICATES_P12_PASSWORD" -T /usr/bin/codesign
        
        # Set keychain settings
        security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" build.keychain
        
        # List certificates for verification
        security find-identity -v -p codesigning
    
    - name: Install provisioning profile
      env:
        PROVISIONING_PROFILE: ${{ secrets.PROVISIONING_PROFILE }}
      run: |
        mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles/
        echo "$PROVISIONING_PROFILE" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision
        echo "Provisioning profile installed"
    
    - name: Resolve Swift Package Dependencies
      run: xcodebuild -resolvePackageDependencies -project FitMunch.xcodeproj -scheme FitMunch
    
    - name: Archive the app
      run: |
        xcodebuild archive \
          -project FitMunch.xcodeproj \
          -scheme FitMunch \
          -configuration Release \
          -archivePath ./build/FitMunch.xcarchive \
          -destination generic/platform=iOS \
          CODE_SIGN_STYLE=Manual \
          PROVISIONING_PROFILE_SPECIFIER="iOS Distribution" \
          DEVELOPMENT_TEAM="${{ secrets.DEVELOPMENT_TEAM }}" \
          MARKETING_VERSION=1.0 \
          CURRENT_PROJECT_VERSION=1
    
    - name: Export IPA
      run: |
        xcodebuild -exportArchive \
          -archivePath ./build/FitMunch.xcarchive \
          -exportOptionsPlist ./ExportOptions.plist \
          -exportPath ./build \
          -allowProvisioningUpdates
    
    - name: Upload IPA as artifact
      uses: actions/upload-artifact@v4
      with:
        name: FitMunch-IPA
        path: ./build/FitMunch.ipa
        retention-days: 7
    
    - name: Upload to App Store Connect
      env:
        ASC_USERNAME: ${{ secrets.ASC_USERNAME }}
        ASC_APP_SPECIFIC_PASSWORD: ${{ secrets.ASC_APP_SPECIFIC_PASSWORD }}
      run: |
        # Validate the IPA
        xcrun altool --validate-app \
          -f ./build/FitMunch.ipa \
          -t ios \
          -u "$ASC_USERNAME" \
          -p "$ASC_APP_SPECIFIC_PASSWORD" \
          --output-format xml
        
        # Upload to App Store Connect
        xcrun altool --upload-app \
          -f ./build/FitMunch.ipa \
          -t ios \
          -u "$ASC_USERNAME" \
          -p "$ASC_APP_SPECIFIC_PASSWORD" \
          --output-format xml
        
        echo "App successfully uploaded to App Store Connect"